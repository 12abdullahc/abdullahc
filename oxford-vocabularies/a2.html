<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A2 Vocabulary — Oxford 3000</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      /* ── Design Tokens ── */
      :root {
        color-scheme: dark;
        --bg-1: #000000;
        --text-1: #ffffff;
        --text-2: #c4c4c4;
        --border-1: rgba(255, 255, 255, 0.15);
        --border-2: rgba(255, 255, 255, 0.25);
        --accent: rgba(214, 188, 162, 0.9);
        --accent-bg: rgba(214, 188, 162, 0.08);
        --accent-border: rgba(214, 188, 162, 0.2);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding-top: 60px;
        background-color: var(--bg-1);
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--text-1);
        min-height: 100vh;
      }

      a {
        text-decoration: none;
      }

      /* ── Header ── */
      .header {
        height: 60px;
        padding: 0 20px;
        border-bottom: 1px solid var(--border-1);
        background-color: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 4px 14px;
        height: 32px;
        flex-shrink: 0;
        border: 1px solid var(--border-1);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-2);
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.2s ease;
        font-family: "Manrope", "Segoe UI", sans-serif;
      }

      .back-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: var(--text-1);
        color: var(--text-1);
      }

      .back-btn i {
        font-size: 11px;
      }

      .header-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .header-title span {
        color: var(--text-2);
        font-weight: 400;
      }

      .header-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        background: var(--accent-bg);
        border: 1px solid var(--accent-border);
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        flex-shrink: 0;
      }

      /* ── Search bar ── */
      .search-wrap {
        flex-shrink: 0;
        position: relative;
      }

      .search-wrap > i {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        color: var(--text-2);
        pointer-events: none;
      }

      .search-clear {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        background: rgba(255, 255, 255, 0.12);
        border: none;
        border-radius: 50%;
        color: var(--text-2);
        font-size: 9px;
        cursor: pointer;
        padding: 0;
        display: none;
        align-items: center;
        justify-content: center;
        line-height: 18px;
        text-align: center;
        transition:
          background 0.15s ease,
          color 0.15s ease;
        flex-shrink: 0;
      }

      .search-clear i {
        display: block;
        line-height: 1;
        position: static;
        transform: none;
      }

      .search-clear:hover {
        background: rgba(255, 255, 255, 0.25);
        color: var(--text-1);
      }

      .search-clear.visible {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #searchInput {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border-1);
        border-radius: 20px;
        padding: 6px 30px 6px 32px;
        font-size: 13px;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--text-1);
        outline: none;
        width: 200px;
        transition:
          border-color 0.2s,
          background 0.2s,
          width 0.3s;
      }

      #searchInput::placeholder {
        color: rgba(196, 196, 196, 0.5);
      }

      #searchInput:focus {
        border-color: rgba(214, 188, 162, 0.4);
        background: rgba(255, 255, 255, 0.09);
        width: 240px;
      }

      /* ── Page ── */
      .page {
        max-width: 1060px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }

      /* ── Stats bar ── */
      .stats-bar {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }

      .stat-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-2);
      }

      .stat-item i {
        color: var(--accent);
        font-size: 12px;
        opacity: 0.85;
      }
      .stat-item strong {
        color: var(--text-1);
      }

      .stat-divider {
        width: 1px;
        height: 16px;
        background: var(--border-1);
      }

      /* ── Word Grid ── */
      .word-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }

      .word-card {
        background: rgba(20, 20, 23, 0.7);
        border: 1px solid var(--border-1);
        border-radius: 12px;
        padding: 16px;
        cursor: pointer;
        transition:
          box-shadow 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
        user-select: none;
      }

      .word-card:hover {
        box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.55);
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(30, 30, 34, 0.85);
      }

      .word-card:active {
        opacity: 0.85;
      }

      .word-card-word {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-1);
        margin-bottom: 3px;
      }

      .word-card-pos {
        font-size: 11px;
        color: var(--accent);
        font-weight: 600;
        opacity: 0.85;
        margin-bottom: 8px;
      }

      .word-card-translation {
        font-size: 12px;
        color: var(--text-2);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .word-card-translation .flag {
        font-size: 13px;
        line-height: 1;
      }

      .word-card.hidden {
        display: none;
      }

      /* ── Empty state ── */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-2);
        display: none;
        grid-column: 1 / -1;
      }

      .empty-state i {
        font-size: 32px;
        opacity: 0.3;
        margin-bottom: 12px;
        display: block;
      }

      .empty-state p {
        margin: 0;
        font-size: 14px;
      }

      /* ── Modal Backdrop ── */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(6px);
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease;
      }

      .modal-backdrop.open {
        opacity: 1;
        pointer-events: all;
      }

      /* ── Modal ── */
      .modal {
        background: #111113;
        border: 1px solid var(--border-2);
        border-radius: 20px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 24px 64px -16px rgba(0, 0, 0, 0.85);
        transform: translateY(16px) scale(0.97);
        transition:
          transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1),
          opacity 0.22s ease;
        opacity: 0;
        overflow: hidden;
      }

      .modal-backdrop.open .modal {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      .modal-header {
        padding: 24px 24px 0 24px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .modal-word {
        font-size: clamp(26px, 5vw, 34px);
        font-weight: 700;
        color: var(--text-1);
        line-height: 1.1;
        margin: 0 0 6px 0;
      }

      .modal-pos {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        background: var(--accent-bg);
        border: 1px solid var(--accent-border);
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.4px;
      }

      .modal-close {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        border-radius: 8px;
        border: 1px solid var(--border-1);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .modal-close:hover {
        background: rgba(255, 255, 255, 0.12);
        color: var(--text-1);
        border-color: var(--border-2);
      }

      .modal-body {
        padding: 20px 24px 24px 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Translation row */
      .modal-translation {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-1);
        border-radius: 12px;
      }

      .modal-translation .flag-icon {
        font-size: 22px;
        line-height: 1;
        flex-shrink: 0;
      }

      .modal-translation-content {
      }

      .modal-translation-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(196, 196, 196, 0.45);
        margin-bottom: 4px;
      }

      .modal-translation-text {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-1);
      }

      /* Example area */
      .modal-example {
        background: rgba(214, 188, 162, 0.05);
        border: 1px solid rgba(214, 188, 162, 0.15);
        border-radius: 12px;
        padding: 16px;
        position: relative;
        overflow: hidden;
      }

      .modal-example::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at top right,
          rgba(214, 188, 162, 0.06) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      .modal-example-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(196, 196, 196, 0.45);
        margin-bottom: 8px;
      }

      .modal-example-text {
        font-size: 14px;
        color: var(--text-2);
        line-height: 1.75;
        margin: 0;
        font-style: normal;
      }

      .modal-example-text strong {
        color: var(--text-1);
        font-weight: 700;
      }

      .modal-example-id {
        font-size: 14px;
        color: var(--text-2);
        line-height: 1.75;
        margin: 10px 0 0 0;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
      }

      /* Listen button */
      .modal-listen-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-1);
        border-radius: 20px;
        color: var(--text-2);
        font-size: 13px;
        font-weight: 600;
        transition: all 0.2s ease;
        font-family: "Manrope", "Segoe UI", sans-serif;
        text-decoration: none;
        align-self: flex-start;
      }

      .modal-listen-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: var(--border-2);
        color: var(--text-1);
        text-decoration: none;
      }

      .modal-listen-btn i {
        font-size: 12px;
        color: var(--accent);
      }

      /* Nav buttons inside modal */
      .modal-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding-top: 4px;
      }

      .modal-nav-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 16px;
        height: 34px;
        border: 1px solid var(--border-1);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-2);
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: "Manrope", "Segoe UI", sans-serif;
      }

      .modal-nav-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: var(--border-2);
        color: var(--text-1);
      }

      .modal-nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .modal-counter {
        font-size: 12px;
        color: rgba(196, 196, 196, 0.5);
        font-weight: 600;
      }

      /* ── Footer ── */
      .footer {
        text-align: center;
        padding: 20px 16px;
        border-top: 1px solid var(--border-1);
      }

      .footer-text {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.35);
        font-weight: 500;
        margin: 0;
      }

      /* ── Responsive ── */
      @media (max-width: 600px) {
        #searchInput {
          width: 140px;
        }
        #searchInput:focus {
          width: 160px;
        }
        .header-title {
          display: none;
        }
        .word-grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <!-- ── Header ── -->
    <header class="header">
      <div class="header-left">
        <a href="index.html" class="back-btn">
          <i class="fas fa-arrow-left"></i> Back
        </a>
        <span class="header-title"
          >Oxford 3000 <span>/ A2 Elementary</span></span
        >
        <span class="header-badge">A2</span>
      </div>
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Search words…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-clear" id="searchClear" aria-label="Clear search">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </header>

    <!-- ── Page ── -->
    <main class="page">
      <div class="stats-bar">
        <div class="stat-item">
          <i class="fas fa-list"></i>
          <span><strong id="visibleCount">36</strong> words</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <i class="fas fa-graduation-cap"></i>
          <span>Level <strong>A2</strong> — Elementary</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <i class="fas fa-book-open"></i>
          <span>Oxford <strong>3000</strong></span>
        </div>
      </div>

      <div class="word-grid" id="wordGrid">
        <!-- populated by JS -->
        <div class="empty-state" id="emptyState">
          <i class="fas fa-search"></i>
          <p>No words match your search.</p>
        </div>
      </div>
    </main>

    <!-- ── Footer ── -->
    <footer class="footer">
      <p class="footer-text">
        &copy; 2026 ABDULLAH C &middot; OXFORD VOCABULARIES A2
      </p>
    </footer>

    <!-- ── Modal ── -->
    <div
      class="modal-backdrop"
      id="modalBackdrop"
      role="dialog"
      aria-modal="true"
      aria-label="Word detail"
    >
      <div class="modal" id="modal">
        <div class="modal-header">
          <div>
            <p class="modal-word" id="modalWord"></p>
            <span class="modal-pos" id="modalPos"></span>
          </div>
          <button class="modal-close" id="modalClose" aria-label="Close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <a class="modal-listen-btn" id="modalListenBtn" href="#">
            <i class="fas fa-volume-up"></i> Listen on Cambridge Dictionary
          </a>

          <div class="modal-translation">
            <span class="flag-icon">🇮🇩</span>
            <div class="modal-translation-content">
              <div class="modal-translation-label">Indonesian</div>
              <div class="modal-translation-text" id="modalTranslation"></div>
            </div>
          </div>

          <div class="modal-example">
            <div class="modal-example-label">Example</div>
            <p class="modal-example-text" id="modalExample"></p>
            <p class="modal-example-id" id="modalExampleId"></p>
          </div>

          <div class="modal-nav">
            <button class="modal-nav-btn" id="prevBtn">
              <i class="fas fa-chevron-left"></i> Previous
            </button>
            <span class="modal-counter" id="modalCounter"></span>
            <button class="modal-nav-btn" id="nextBtn">
              Next <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const WORDS = [
        {
          word: "ability",

          example:

        {

        {

        {

        {

            "She was relieved to hear that all the passengers were still <strong>alive</strong>.",

        {
          word: "all",

        w.idExample = WORD_ID_EXAMPLES[w.word] || "";
      });

      // ── Render cards ──
      const grid = document.getElementById("wordGrid");
      const emptyState = document.getElementById("emptyState");
      const visibleCount = document.getElementById("visibleCount");

      function renderCards(list) {
        // Remove existing cards (keep empty state node)
        grid.querySelectorAll(".word-card").forEach((el) => el.remove());

        if (list.length === 0) {
          emptyState.style.display = "block";
          visibleCount.textContent = "0";
          return;
        }

        emptyState.style.display = "none";
        visibleCount.textContent = list.length;

        list.forEach((item, idx) => {
          const card = document.createElement("div");
          card.className = "word-card";
          card.dataset.index = idx;
          card.innerHTML = `
            <div class="word-card-word">${item.word}</div>
            <div class="word-card-pos">${item.pos}</div>
            <div class="word-card-translation">
              <span class="flag">🇮🇩</span> ${item.id}
            </div>
          `;
          card.addEventListener("click", () => openModal(idx));
          grid.insertBefore(card, emptyState);
        });
      }

      renderCards(WORDS);

      // ── Search ──
      let filteredWords = WORDS;

      const searchInput = document.getElementById("searchInput");
      const searchClear = document.getElementById("searchClear");

      function performSearch(q) {
        filteredWords = q
          ? WORDS.filter(
              (w) =>
                w.word.toLowerCase().includes(q) ||
                w.id.toLowerCase().includes(q) ||
                w.pos.toLowerCase().includes(q),
            )
          : WORDS;
        renderCards(filteredWords);
        searchClear.classList.toggle("visible", q.length > 0);
      }

      searchInput.addEventListener("input", function () {
        performSearch(this.value.trim().toLowerCase());
      });

      searchClear.addEventListener("click", () => {
        searchInput.value = "";
        performSearch("");
        searchInput.focus();
      });

      // ── Modal ──
      const backdrop = document.getElementById("modalBackdrop");
      const modalWord = document.getElementById("modalWord");
      const modalPos = document.getElementById("modalPos");
      const modalTranslation = document.getElementById("modalTranslation");
      const modalExample = document.getElementById("modalExample");
      const modalCounter = document.getElementById("modalCounter");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");

      let currentIndex = 0;

      function openModal(idx) {
        currentIndex = idx;
        updateModal();
        backdrop.classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        backdrop.classList.remove("open");
        document.body.style.overflow = "";
      }

      function updateModal() {
        const item = filteredWords[currentIndex];
        modalWord.textContent = item.word;
        modalPos.textContent = item.pos;
        modalTranslation.textContent = item.id;
        document.getElementById("modalExample").innerHTML = item.example;
        document.getElementById("modalExampleId").textContent = item.idExample;
        const slug = item.word
          .split(",")[0]
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "-");
        document.getElementById("modalListenBtn").href =
          "https://dictionary.cambridge.org/dictionary/english/" + slug;
        modalCounter.textContent = `${currentIndex + 1} / ${filteredWords.length}`;
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === filteredWords.length - 1;
      }

      document
        .getElementById("modalClose")
        .addEventListener("click", closeModal);

      backdrop.addEventListener("click", (e) => {
        if (e.target === backdrop) closeModal();
      });

      prevBtn.addEventListener("click", () => {
        if (currentIndex > 0) {
          currentIndex--;
          updateModal();
        }
      });

      nextBtn.addEventListener("click", () => {
        if (currentIndex < filteredWords.length - 1) {
          currentIndex++;
          updateModal();
        }
      });

      document.addEventListener("keydown", (e) => {
        if (!backdrop.classList.contains("open")) return;
        if (e.key === "Escape") closeModal();
        if (e.key === "ArrowLeft" && currentIndex > 0) {
          currentIndex--;
          updateModal();
        }
        if (e.key === "ArrowRight" && currentIndex < filteredWords.length - 1) {
          currentIndex++;
          updateModal();
        }
      });
